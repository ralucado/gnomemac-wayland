<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Map Mac-style CSS generic families to the SF / New York fonts installed
     under ~/.local/share/fonts/apple/, so web UIs that use
     "font-family: -apple-system, BlinkMacSystemFont, system-ui, ..."
     render with SF Pro instead of falling back to a serif.
     Uses <match> blocks because <alias> doesn't trigger for families
     fontconfig has never seen before (which is the case for these). -->
<fontconfig>

  <!-- Apple/Blink mac-system aliases -> SF Pro Text -->
  <match target="pattern">
    <test name="family" qual="any"><string>-apple-system</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>SF Pro Text</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>BlinkMacSystemFont</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>SF Pro Text</string></edit>
  </match>

  <!-- CSS generic UI families -> SF Pro / SF Mono -->
  <match target="pattern">
    <test name="family" qual="any"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>SF Pro Text</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>ui-sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>SF Pro Text</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>ui-monospace</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>SF Mono</string></edit>
  </match>
  <match target="pattern">
    <test name="family" qual="any"><string>ui-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>New York Medium</string></edit>
  </match>

  <!-- Bare "New York" -> Medium-size variant by default -->
  <match target="pattern">
    <test name="family" qual="any"><string>New York</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>New York Medium</string></edit>
  </match>

</fontconfig>
